<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-Sheet - Log In</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <!-- Tailwind is precompiled to a static stylesheet by the Tailwind CLI (see
         tailwind/login.config.cjs; run `npm run build:css`) instead of the runtime
         CDN/JIT build, which printed a production warning. -->
    <link rel="stylesheet" href="/styles-login.css"/>
    <!-- Use Roboto font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen font-[Roboto]">
    <!-- Main login container card -->
    <div class="bg-white p-8 rounded-2xl shadow-xl w-96 border border-slate-100">
        <!-- Logo/Title header -->
        <h2 class="text-2xl font-bold text-slate-800 text-center mb-6">Welcome to Co-Sheet</h2>
        <p class="text-slate-500 text-center mb-8 text-sm">Please sign in to access collaborative project plans.</p>
        
        <!-- Authentication provider buttons -->
        <div class="space-y-4">
            <!-- Google Login Redirect Link -->
            <a href="/auth/google" class="w-full flex items-center justify-center gap-3 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 font-medium text-slate-700 transition-all">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
                </svg>
                Sign in with Google
            </a>
            
            <!-- External / self-hosted OIDC Login Redirect Link (configured via OIDC_* env vars) -->
            <a href="/auth/oidc-sso" class="w-full flex items-center justify-center gap-3 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium transition-all shadow-md">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Sign in with Local OIDC
            </a>

            <!-- MOCK_OIDC_START: Built-in Mock OIDC (no external provider needed; for
                 local development & tests). The server strips this block from the
                 served page when mock OIDC is disabled (see MOCK_OIDC_ENABLED). -->
            <a href="/auth/oidc" class="w-full flex items-center justify-center gap-3 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 font-medium text-slate-700 transition-all">
                Sign in with Mock OIDC
            </a>
            <!-- MOCK_OIDC_END -->
        </div>

        <!-- Shown when the Local OIDC button is used but no provider is configured -->
        <p id="oidc-error" class="hidden mt-6 text-center text-sm text-red-600">
            Local OIDC is not configured. Set the <code class="font-mono">OIDC_*</code> variables in your <code class="font-mono">.env</code> file.
        </p>
        <script>
            // Reveal the configuration hint when redirected back with ?error=oidc_not_configured.
            if (new URLSearchParams(window.location.search).get('error') === 'oidc_not_configured') {
                document.getElementById('oidc-error').classList.remove('hidden');
            }
        </script>
    </div>
</body>
</html>
