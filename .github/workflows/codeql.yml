# GitHub CodeQL static analysis (SAST).
#
# CodeQL scans the JavaScript/TypeScript source and publishes findings to the
# Security > Code scanning tab. No external accounts or secrets are required — it
# runs entirely on GitHub-hosted runners against GitHub's own query packs.
#
# JavaScript/TypeScript is interpreted, so there is no build step: CodeQL builds
# its database directly from the source.
name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel superseded runs on the same ref (mirrors the PR test workflow).
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JS/TS
    runs-on: ubuntu-latest

    permissions:
      contents: read          # checkout the source
      security-events: write  # upload results to code scanning
      actions: read           # read workflow run metadata (private repos)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Add the extended query suite for deeper coverage beyond the default set.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
