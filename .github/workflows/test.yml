name: PR Tests & Coverage

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]

# Allow the workflow to post/update a comment on the pull request.
permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs when a PR receives new pushes.
concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests and report coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: tests
        env:
          NODE_ENV: test
        run: |
          mkdir -p coverage
          # `--test-force-exit`: a test file leaves a lingering handle (WS/HTTP server);
          # without this the runner hangs before the coverage report is printed.
          node --test --test-force-exit --experimental-test-coverage \
            --test-reporter=spec --test-reporter-destination=stdout \
            --test-reporter=lcov --test-reporter-destination=coverage/lcov.info \
            tests/*.test.js | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Build report
        if: always()
        id: report
        run: |
          # Parse the test summary counts emitted by the spec reporter ("ℹ tests 78" etc.).
          # Match only the summary lines (e.g. "ℹ tests 78"); $3 must be numeric so the
          # coverage table's "tests" directory row does not clobber the count.
          field() { awk -v k="$1" '$2==k && $3 ~ /^[0-9]+$/ {n=$3} END {print (n==""?0:n)}' test-output.txt; }
          tests=$(field tests); pass=$(field pass); fail=$(field fail); skipped=$(field skipped)

          # Parse the "all files" totals line from the coverage table (pipe-delimited).
          read -r lines branches funcs <<<"$(awk -F'|' '/all files/ {
            gsub(/ /,"",$2); gsub(/ /,"",$3); gsub(/ /,"",$4); print $2, $3, $4 }' test-output.txt)"
          lines=${lines:-0}; branches=${branches:-0}; funcs=${funcs:-0}

          if [ "${{ steps.tests.outputs.exit_code }}" = "0" ]; then
            status="✅ Passing"
          else
            status="❌ Failing"
          fi

          {
            echo "<!-- test-coverage-report -->"
            echo "## 🧪 Test Report"
            echo ""
            echo "**Status:** $status"
            echo ""
            echo "| Tests | Passed | Failed | Skipped |"
            echo "|------:|-------:|-------:|--------:|"
            echo "| $tests | $pass | $fail | $skipped |"
            echo ""
            echo "### Coverage"
            echo "| Type | Coverage |"
            echo "|------|---------:|"
            echo "| Lines | ${lines}% |"
            echo "| Branches | ${branches}% |"
            echo "| Functions | ${funcs}% |"
            echo ""
            echo "<details><summary>📊 Full coverage by file</summary>"
            echo ""
            echo '```'
            # Strip the leading "ℹ " info glyph from each table line.
            sed -n '/start of coverage report/,/end of coverage report/p' test-output.txt \
              | sed 's/^[^ ]* //'
            echo '```'
            echo "</details>"
            echo ""
            echo "_Generated by \`node --test --experimental-test-coverage\` · commit \`${GITHUB_SHA:0:7}\`_"
          } > report.md

          # Mirror the report into the Actions run summary too.
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            const marker = '<!-- test-coverage-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/lcov.info
            test-output.txt
          if-no-files-found: warn

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: |
          echo "Tests failed (exit code ${{ steps.tests.outputs.exit_code }})."
          exit 1
