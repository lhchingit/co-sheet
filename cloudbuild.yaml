# Cloud Build pipeline: build the image, push it to Artifact Registry, and deploy
# to Cloud Run. Intended for CI (e.g. a build trigger on push to main).
#
# Non-secret config is passed via substitutions; secrets (DB password, Google
# OAuth client) are read from Secret Manager at deploy time via --set-secrets so
# they never appear in build logs or this file. See DEPLOY.md > CI with Cloud Build.
#
# Required substitutions (set on the trigger or via --substitutions):
#   _REGION              e.g. us-central1
#   _SERVICE             e.g. cosheet
#   _SQL_INSTANCE        Cloud SQL instance short name, e.g. cosheet-db
#   _DB_NAME             e.g. cosheet
#   _DB_USER             e.g. postgres
#   _BASE_URL            the Cloud Run service URL (set after the first deploy)
#   _SUPER_ADMIN_EMAILS  optional comma-separated allowlist (default "")
#
# Required Secret Manager secrets (latest version):
#   cosheet-db-pass, cosheet-google-client-id, cosheet-google-client-secret

substitutions:
  _REGION: us-central1
  _SERVICE: cosheet
  _SQL_INSTANCE: cosheet-db
  _DB_NAME: cosheet
  _DB_USER: postgres
  _BASE_URL: ""
  _SUPER_ADMIN_EMAILS: ""
  _AR_REPO: cosheet            # Artifact Registry repository name

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build the container image from the existing multi-stage Dockerfile.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  # 2. Push both tags to Artifact Registry.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

  # 3. Deploy to Cloud Run. Pinned to a single instance because live edits are
  #    broadcast in-process and sessions are in memory (see DEPLOY.md > Scaling).
  #    DATABASE_URL is assembled from the DB secret via a shell so the password
  #    is never materialized in substitutions or logs.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    secretEnv: [DB_PASS]
    args:
      - -c
      - |
        set -euo pipefail
        CONN_NAME="$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}"
        DATABASE_URL="postgresql://${_DB_USER}:$${DB_PASS}@/${_DB_NAME}?host=/cloudsql/$${CONN_NAME}"
        gcloud run deploy ${_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=1 \
          --max-instances=1 \
          --timeout=3600 \
          --port=3000 \
          --add-cloudsql-instances="$${CONN_NAME}" \
          --set-env-vars="^@@^NODE_ENV=production@@BASE_URL=${_BASE_URL}@@SUPER_ADMIN_EMAILS=${_SUPER_ADMIN_EMAILS}@@DATABASE_URL=$${DATABASE_URL}" \
          --set-secrets="GOOGLE_CLIENT_ID=cosheet-google-client-id:latest,GOOGLE_CLIENT_SECRET=cosheet-google-client-secret:latest"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/cosheet-db-pass/versions/latest
      env: DB_PASS

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
